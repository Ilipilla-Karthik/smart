<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Lender - Loan Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🏦 Smart Lender</h1>
    <h2>Loan Approval Prediction</h2>

    <form action="/submit" method="POST">

        <!-- Gender -->
        <label>Gender</label>
        <select name="Gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <!-- Married -->
        <label>Marital Status</label>
        <select name="Married" required>
            <option value="" disabled selected>Select Marital Status</option>
            <option value="Yes">Married</option>
            <option value="No">Unmarried</option>
        </select>

        <!-- Dependents -->
        <label>Number of Dependents</label>
        <select name="Dependents" required>
            <option value="" disabled selected>Select Dependents</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3+</option>
        </select>

        <!-- Education -->
        <label>Education</label>
        <select name="Education" required>
            <option value="" disabled selected>Select Education</option>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
        </select>

        <!-- Self Employed -->
        <label>Employment Type</label>
        <select name="Self_Employed" required>
            <option value="" disabled selected>Select Employment Type</option>
            <option value="No">Salaried</option>
            <option value="Yes">Self Employed</option>
        </select>

        <!-- Applicant Income -->
        <label>Applicant Monthly Income (₹)</label>
        <input
            type="number"
            name="ApplicantIncome"
            placeholder="Example: 5000"
            min="0"
            max="100000"
            required>

        <!-- Co Applicant -->
        <label>Co-applicant Monthly Income (₹)</label>
        <input
            type="number"
            name="CoapplicantIncome"
            placeholder="Example: 2000"
            min="0"
            max="100000"
            required>

        <!-- Loan Amount -->
        <label>Loan Amount (₹ Thousands)</label>
        <input
            type="number"
            name="LoanAmount"
            placeholder="Example: 150 (₹1,50,000)"
            min="1"
            max="700"
            required>

        <small style="color:gray;">
            Example: Enter 150 for ₹1,50,000
        </small>

        <br><br>

        <!-- Loan Term -->
        <label>Loan Term</label>
        <select name="Loan_Amount_Term" required>
            <option value="" disabled selected>Select Loan Term</option>
            <option value="360">360 Months (30 Years)</option>
            <option value="240">240 Months (20 Years)</option>
            <option value="180">180 Months (15 Years)</option>
            <option value="120">120 Months (10 Years)</option>
            <option value="84">84 Months (7 Years)</option>
            <option value="60">60 Months (5 Years)</option>
            <option value="36">36 Months (3 Years)</option>
        </select>

        <!-- Credit History -->
        <label>Credit History</label>
        <select name="Credit_History" required>
            <option value="" disabled selected>Select Credit History</option>
            <option value="1">Good Credit History</option>
            <option value="0">Poor / No Credit History</option>
        </select>

        <!-- Property Area -->
        <label>Property Area</label>
        <select name="Property_Area" required>
            <option value="" disabled selected>Select Property Area</option>
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
        </select>

        <br>

        <button type="submit">Predict Loan Approval</button>

    </form>

</div>

</body>
</html>
